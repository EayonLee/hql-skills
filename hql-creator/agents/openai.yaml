interface:
  display_name: "HQL Creator"
  short_description: "把查询意图压缩成 DraftRequestV1，再编译成完整 HQL"
  default_prompt: "本 skill 的根目录就是当前 `SKILL.md` 所在目录。`scripts/`、`references/` 等相对路径都相对这个 skill 根目录解析，不相对用户项目目录或当前工作目录解析。执行命令时默认都在 skill 根目录运行；更稳的写法是 `cd <skill-root> && python3 scripts/main.py ...`。先在 `detail`、`aggregate-total`、`aggregate-grouped`、`aggregate-topk`、`detail-topk` 五种骨架中选一种；拿不准就先运行 `cd <skill-root> && python3 scripts/main.py skeleton <kind>`。公共主路径只写 DraftRequestV1：`request_version=1`，`source` 用 `日志/告警/原始告警`，时间缺省时省略 `time`，总数统计时省略 `group_by`，`group_by` 只能是单个字段字符串，`field_filters` 固定写成 `{field, operator, value}`。先把业务语义条件写进 `semantic_macros` 或 `semantic_filters`，剩余显式字段条件再写进 `field_filters`。操作符按这个顺序选：先普通比较；通配匹配用 `like`；字段值需要命中多个候选值之一时用 `any_match`，标准写法是值数组；右侧表达业务归属范围且当前 source 存在可绑定的 `belong_rhs` 字段时用 `belong`，左侧必须是实体字段，右侧必须是业务归属字段；只有前面几种都不适合时才用 `rlike`。调用 `cd <skill-root> && python3 scripts/main.py --request '<json>'`。成功后立即停止。把 `main.py` 标准输出当成只读产物，最终回复只返回一个 `hql` 代码块，代码块中的每一个字符都必须与标准输出完全一致，不要做任何编辑。不要增加空格、删除空格、替换字段名、替换标点、替换括号、替换大小写。中文、英文、数字混在一起的字段名也必须原样复制，例如 `内网IP` 不能改成 `内网 IP`，`Windows系统进程` 不能改成 `Windows 系统进程`。失败时最多再跑一次 `--json` 或 `skeleton`。"
